<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Boathouse Blooms · Proposals</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#f5f1ed;--surface:#ffffff;--border:#bdb1a3;--border-bright:#9a8975;
    --text:#15090a;--muted:#3a2e26;--accent:#9d3641;--accent-dim:rgba(157,54,65,0.12);
    --red:#8c1818;--red-dim:#fdf0ef;--gold:#5d4206;--gold-dim:#fdf8ed;
    --green:#08543a;--green-dim:#edf8f3;--purple:#3d2c80;--purple-dim:#eeeaf8;--blue:#0f3aab;
    --orange:#7e2c04;
    --sidebar-w:280px;
    --detail-scale:1;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Cormorant Garamond',Georgia,serif;background:var(--bg);color:var(--text);min-height:100vh;}

  /* ── MOBILE layout (default) ── */
  .app-shell{display:flex;flex-direction:column;align-items:center;min-height:100vh;}
  .sidebar{width:100%;}
  .main-col{width:100%;}

  .nav{width:100%;max-width:700px;padding:20px 20px 0;display:flex;align-items:center;gap:12px;}
  .nav-title h1{font-size:18px;font-weight:600;color:var(--accent);}
  .nav-title p{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;margin-top:2px;font-family:'DM Mono',monospace;}

  .year-bar{width:100%;max-width:700px;padding:12px 20px 0;display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
  .year-label{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;flex-shrink:0;}
  .year-btn{flex-shrink:0;padding:5px 14px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--muted);font-family:'DM Mono',monospace;font-size:11px;cursor:pointer;transition:all .15s;}
  .year-btn:hover{border-color:var(--accent);color:var(--accent);}
  .year-btn.active{background:rgba(96,165,250,0.15);color:var(--blue);border-color:var(--blue);}
  .year-btn.past.active{background:rgba(106,96,85,0.15);color:#5e5048;border-color:#a8a098;}
  .year-bar-spacer{flex:1;}
  .year-bar-action{flex-shrink:0;padding:5px 12px;border-radius:20px;border:1px solid var(--border-bright);background:transparent;color:var(--muted);font-family:'DM Mono',monospace;font-size:10px;cursor:pointer;transition:all .15s;}
  .year-bar-action:hover{border-color:var(--accent);color:var(--accent);}
  .year-bar-action.cl{background:var(--accent-dim);border-color:var(--accent);color:var(--accent);}
  .year-bar-action.cl:hover{background:rgba(200,98,106,0.18);}

  .search-bar{width:100%;max-width:700px;padding:8px 20px 0;}
  .search-inner{background:var(--surface);border:1px solid var(--border-bright);border-radius:10px;padding:8px 12px;display:flex;align-items:center;gap:8px;transition:border-color .15s;}
  .search-inner:focus-within{border-color:var(--accent);}
  .search-icon{font-size:14px;flex-shrink:0;opacity:.5;}
  .search-input{flex:1;background:transparent;border:none;outline:none;font-family:'Cormorant Garamond',serif;font-size:14px;color:var(--text);}
  .search-input::placeholder{color:var(--muted);}
  .search-clear{background:none;border:none;color:var(--muted);cursor:pointer;font-size:13px;padding:0 2px;line-height:1;flex-shrink:0;}
  .search-clear:hover{color:var(--accent);}

  .refresh-box{width:100%;max-width:700px;padding:10px 20px 0;}
  .refresh-inner{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:10px 14px;display:flex;align-items:center;gap:10px;}
  .refresh-icon{font-size:18px;flex-shrink:0;}
  .refresh-text p{font-size:10px;color:var(--muted);line-height:1.5;font-family:'DM Mono',monospace;}

  .stats{width:100%;max-width:700px;padding:10px 20px 10px;display:flex;gap:8px;}
  .stat-card{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:8px 10px;}
  .stat-card .num{font-size:20px;font-weight:600;}
  .stat-card .lbl{font-family:'DM Mono',monospace;font-size:8px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-top:2px;}

  .filters{width:100%;max-width:700px;padding:0 20px 6px;display:flex;gap:7px;overflow-x:auto;}
  .filter-btn{flex-shrink:0;padding:6px 14px;border-radius:24px;border:1px solid var(--border);background:transparent;color:var(--muted);font-family:'Cormorant Garamond',serif;font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;}
  .filter-btn.active{background:var(--accent);color:var(--bg);border-color:var(--accent);}

  /* Stage filters — mobile: horizontal scroll */
  .stage-filters{width:100%;max-width:700px;padding:0 20px 10px;display:none;gap:6px;overflow-x:auto;align-items:center;}
  .stage-filters.visible{display:flex;}
  .stage-lbl{font-family:'DM Mono',monospace;font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;flex-shrink:0;padding-right:2px;}
  .stage-btn{flex-shrink:0;padding:4px 11px;border-radius:20px;border:1px solid;background:transparent;font-family:'DM Mono',monospace;font-size:9px;cursor:pointer;transition:all .15s;white-space:nowrap;}
  .stage-btn:not(.active){color:var(--muted);border-color:var(--border);background:transparent;}

  .list{width:100%;max-width:700px;padding:0 12px 80px;flex:1;}

  .card{border-radius:12px;padding:11px 13px;margin-bottom:7px;cursor:pointer;transition:box-shadow .15s,opacity .1s;border-left-width:3px;border-left-style:solid;border-top:1px solid;border-right:1px solid;border-bottom:1px solid;}
  .card:hover{opacity:.88;}
  .card.type-accepted{background:#fff0f0;border-color:#f5b0b0;border-left-color:var(--red);}
  .card.type-gmail-only{background:#fff4ec;border-color:#f5c898;border-left-color:var(--orange);}
  .card.type-cal{background:var(--purple-dim);border-color:#c0b4e8;border-left-color:var(--purple);}
  .card.type-hb{background:var(--surface);border-color:var(--border);border-left-color:var(--border-bright);}

  .card-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:6px;}
  .card-name{font-size:15px;font-weight:600;line-height:1.2;}
  .card-flag{font-size:15px;flex-shrink:0;}
  .card-tags{display:flex;gap:5px;flex-wrap:wrap;align-items:center;}
  .tag{font-family:'DM Mono',monospace;font-size:9px;font-weight:500;padding:2px 8px;border-radius:20px;border:1px solid;white-space:nowrap;}
  .tag-noHB{background:#fff0f0;color:var(--red);border-color:#fcc;}
  .tag-accepted{background:#fff0f0;color:var(--red);border-color:#f5aaaa;font-weight:700;}
  .tag-gmail-only{background:#fff4e8;color:var(--orange);border-color:#f5d0a0;}
  .tag-cal-only{background:#f2f0f9;color:var(--purple);border-color:#c4b5fd;}
  .tag-past{background:#ece8e2;color:#6a6055;border-color:#cfc8be;}
  .tag-soon{background:#fffbea;color:var(--gold);border-color:#f0d878;}
  .tag-date{background:var(--surface);color:var(--muted);border-color:var(--border);}
  .tag-gmail{background:#fffbea;color:var(--gold);border-color:#ede0b0;}
  .tag-email{background:var(--surface);color:#3a5070;border-color:var(--border);font-size:8px;}
  .tag-stage{border:1px solid;}
  .tag-hb-cal{background:#e8f4ff;color:#2563eb;border-color:#bfdbfe;font-size:8px;}
  .tag-archived{background:#efeae3;color:var(--muted);border-color:#cec5ba;font-weight:600;}
  /* Archived cards are muted — historical records, not active work */
  .card.type-archived{opacity:0.65;}
  .card.type-archived:hover{opacity:0.9;}
  /* Past-event cards (any type) — de-emphasized gray. Override type-specific colors. */
  .card.is-past:not(.type-archived){background:#f5f3f0;border-color:#d8d3cc;border-left-color:#a8a098;opacity:0.85;}
  .card.is-past:not(.type-archived):hover{opacity:1;}

  .card-detail{display:none;margin-top:10px;padding-top:10px;border-top:1px solid var(--border);font-size:calc(13px * var(--detail-scale));line-height:1.9;color:var(--text);width:100%;max-width:100%;overflow:hidden;overflow-wrap:break-word;word-break:break-word;}
  .card-detail.open{display:block;}
  .card-detail span{color:var(--text);}
  .card-detail .note{margin-bottom:6px;display:block;}
  .card-detail .note.red{color:#9c2417;}
  .card-detail .note.orange{color:#9e3806;}
  .card-detail .note.purple{color:var(--purple);}
  .card-detail .note.warn{color:var(--gold);}
  .card-detail .note.ok{color:var(--muted);}
  .card-detail .note.archived{color:var(--muted);font-style:italic;}

  /* ── Narrative pane (Full History) ── */
  .history-btn{display:inline-flex;align-items:center;gap:6px;margin-top:6px;padding:4px 10px;border-radius:14px;border:1px solid var(--border-bright);background:transparent;color:var(--muted);font-family:'DM Mono',monospace;font-size:calc(11px * var(--detail-scale));cursor:pointer;transition:all .15s;letter-spacing:0.5px;}
  .history-btn:hover{border-color:var(--accent);color:var(--accent);}
  .history-btn.open{background:var(--accent-dim);border-color:var(--accent);color:var(--accent);}
  /* "+ Add to Calendar" pill — shown on No Cal cards */
  .addcal-btn{display:inline-flex;align-items:center;gap:5px;margin-top:6px;padding:5px 12px;border-radius:14px;border:1px solid var(--green);background:var(--green-dim);color:var(--green);font-family:'DM Mono',monospace;font-size:calc(11px * var(--detail-scale));cursor:pointer;transition:all .15s;letter-spacing:0.5px;text-decoration:none;}
  .addcal-btn:hover{background:#dff0e8;}
  .addcal-note{display:block;margin-top:4px;font-family:'DM Mono',monospace;font-size:calc(10px * var(--detail-scale));color:var(--muted);line-height:1.5;}
  .narrative{display:none;margin-top:10px;padding:12px 14px;background:#faf7f3;border:1px solid var(--border);border-radius:8px;font-family:'Cormorant Garamond',Georgia,serif;}
  .narrative.open{display:block;}
  .narrative-summary{font-size:calc(15px * var(--detail-scale));line-height:1.55;color:var(--text);font-style:italic;margin-bottom:10px;padding-bottom:10px;border-bottom:1px dotted var(--border);}
  .narrative-timeline{list-style:none;padding:0;margin:0;}
  .narrative-entry{display:grid;grid-template-columns:72px 44px 1fr;gap:10px;align-items:baseline;padding:4px 0;font-size:calc(13px * var(--detail-scale));line-height:1.5;}
  .narrative-date{font-family:'DM Mono',monospace;font-size:calc(11px * var(--detail-scale));color:var(--muted);letter-spacing:0.3px;}
  .narrative-source{font-family:'DM Mono',monospace;font-size:calc(10px * var(--detail-scale));padding:1px 6px;border-radius:8px;letter-spacing:0.3px;text-align:center;white-space:nowrap;}
  .narrative-source.gmail-out{background:var(--gold-dim);color:var(--gold);}
  .narrative-source.gmail-in{background:var(--green-dim);color:var(--green);}
  .narrative-source.zapier{background:var(--purple-dim);color:var(--purple);}
  .narrative-source.calendar{background:#eef2fa;color:var(--blue);}
  .narrative-source.note{background:#f0ede8;color:var(--muted);}
  .narrative-text{color:var(--text);font-size:calc(14px * var(--detail-scale));}

  .empty{text-align:center;padding:60px 20px;color:var(--muted);}
  ::-webkit-scrollbar{width:3px;height:3px;}
  ::-webkit-scrollbar-thumb{background:var(--border-bright);border-radius:2px;}

  /* ── DESKTOP layout (≥900px) ── */
  @media(min-width:900px){
    body{overflow:hidden;height:100vh;}
    .app-shell{flex-direction:row;align-items:stretch;height:100vh;overflow:hidden;max-width:none;}

    /* Sidebar */
    .sidebar{width:var(--sidebar-w);min-width:var(--sidebar-w);height:100vh;overflow-y:auto;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;padding:0 0 24px;flex-shrink:0;}
    .sidebar::-webkit-scrollbar{width:3px;}
    .sidebar::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}

    /* Main content area */
    .main-col{flex:1;height:100vh;overflow-y:auto;display:flex;flex-direction:column;align-items:stretch;}
    .main-col::-webkit-scrollbar{width:4px;}
    .main-col::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}

    /* Nav — sits inside sidebar on desktop */
    .nav{max-width:none;width:100%;padding:24px 20px 16px;border-bottom:1px solid var(--border);margin-bottom:4px;}

    /* Year bar — sidebar on desktop */
    .year-bar{max-width:none;width:100%;padding:12px 16px 12px;flex-wrap:wrap;gap:6px;border-bottom:1px solid var(--border);}
    .year-bar-spacer{display:none;}
    .year-bar-action.cl{width:100%;text-align:center;margin-top:4px;}

    /* Search bar — sidebar */
    .search-bar{max-width:none;width:100%;padding:12px 16px 0;}
    .search-inner{border-radius:8px;}

    /* Status bar (refresh-box) — sidebar */
    .refresh-box{max-width:none;width:100%;padding:10px 16px 0;}
    .refresh-inner{border-radius:8px;flex-direction:column;align-items:flex-start;gap:6px;}
    .refresh-text p{font-size:9px;line-height:1.7;}

    /* Stats — sidebar, stacked 2×2 */
    .stats{max-width:none;width:100%;padding:10px 16px 0;display:grid;grid-template-columns:1fr 1fr;gap:6px;}
    .stat-card{padding:10px 12px;}
    .stat-card .num{font-size:22px;}
    .stat-card .lbl{font-size:8px;}

    /* Filter tabs — sidebar, vertical stack */
    .filters{max-width:none;width:100%;padding:12px 16px 0;flex-direction:column;gap:5px;overflow-x:visible;}
    .filter-btn{text-align:left;border-radius:8px;padding:8px 12px;font-size:13px;}

    /* Stage filters — sidebar, wrapped grid (no scroll!) */
    .stage-filters{max-width:none;width:100%;padding:6px 16px 0;flex-wrap:wrap;overflow-x:visible;gap:5px;}
    .stage-filters.visible{display:flex;}
    .stage-lbl{width:100%;padding:0 0 2px;}
    .stage-btn{flex-shrink:0;}

    /* Card list — main column */
    .list{max-width:none;width:100%;padding:16px 20px 40px;flex:1;}

    /* Cards — slightly more spacious on desktop */
    .card{padding:13px 16px;margin-bottom:8px;transition:box-shadow .15s,transform .1s;}
    .card:hover{opacity:1;box-shadow:0 2px 12px rgba(0,0,0,0.08);transform:translateY(-1px);}
    .card-name{font-size:16px;}

    /* Desktop-only: card detail shows inline with 2-col layout */
    .card-detail.open{display:grid;grid-template-columns:1fr 1fr;gap:0 20px;}
    .card-detail.open .note{grid-column:1/-1;}
    .card-detail.open .history-btn{grid-column:1/-1;justify-self:start;}
    .card-detail.open .narrative{grid-column:1/-1;}
  }
</style>
</head>

<style>
#pw-gate{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:9999;flex-direction:column;gap:16px;}
#pw-gate.hidden{display:none;}
.pw-box{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:32px 28px;width:320px;text-align:center;}
.pw-box h2{font-size:20px;font-weight:600;color:var(--accent);margin-bottom:6px;}
.pw-box p{font-size:12px;color:var(--muted);font-family:'DM Mono',monospace;margin-bottom:20px;}
.pw-input{width:100%;background:var(--bg);border:1px solid var(--border-bright);border-radius:8px;padding:10px 14px;color:var(--text);font-family:'DM Mono',monospace;font-size:13px;outline:none;margin-bottom:12px;}
.pw-input:focus{border-color:var(--accent);}
.pw-btn{width:100%;background:var(--accent-dim);border:1px solid var(--accent);border-radius:8px;color:var(--accent);font-family:'Cormorant Garamond',serif;font-size:14px;font-weight:600;padding:10px;cursor:pointer;transition:all .15s;}
.pw-btn:hover{background:rgba(232,180,184,0.25);}
.pw-btn-faceid{width:100%;background:transparent;border:1px solid var(--border-bright);border-radius:8px;color:var(--muted);font-family:'DM Mono',monospace;font-size:12px;padding:9px;cursor:pointer;transition:all .15s;margin-top:8px;}
.pw-btn-faceid:hover{border-color:var(--accent);color:var(--accent);}
.pw-error{font-size:11px;color:var(--red);font-family:'DM Mono',monospace;display:none;margin-top:6px;}
.pw-status{font-size:11px;color:var(--muted);font-family:'DM Mono',monospace;margin-top:6px;min-height:16px;}
</style>

<div id="pw-gate">
  <div class="pw-box">
    <div style="font-size:32px;margin-bottom:12px" id="pw-icon">🌸</div>
    <h2>Boathouse Blooms</h2>
    <p id="pw-subtitle">Enter password to continue</p>
    <input class="pw-input" type="password" id="pw-input" placeholder="Password" onkeydown="if(event.key==='Enter')checkPw()"/>
    <button class="pw-btn" onclick="checkPw()">Enter</button>
    <button class="pw-btn-faceid" id="faceid-btn" onclick="tryFaceId()" style="display:none">Use Face ID / Biometrics</button>
    <div class="pw-error" id="pw-error">Incorrect password</div>
    <div class="pw-status" id="pw-status"></div>
  </div>
</div>

<script>
// ── WebAuthn / Face ID constants ──────────────────────────────────────────────
// Uses proper passkey registration (residentKey: required, random user.id)
// so credentials are stored in iCloud Keychain and sync across Apple devices.
// CRED_KEY: base64 credential ID  USER_KEY: base64 random user.id (required to be unique)
const RP_ID = location.hostname;
const CRED_KEY = 'bb_webauthn_cred_id';
const USER_KEY = 'bb_webauthn_user_id';
const CHALLENGE = new Uint8Array([0xB0, 0xA7, 0x33, 0x5E, 0x4F, 0x8C, 0x2D, 0x91,
                                   0x7A, 0x6E, 0xF2, 0x19, 0x85, 0xC4, 0x3B, 0x70]);

function unlock(){
  sessionStorage.setItem('bbauth','1');
  document.getElementById('pw-gate').classList.add('hidden');
}

function hasWebAuthn(){
  return window.PublicKeyCredential && location.protocol === 'https:';
}

function storedCredId(){
  try { return localStorage.getItem(CRED_KEY); } catch(e){ return null; }
}

// Safe base64 encoder — no spread operator (avoids stack overflow on large buffers)
function uint8ToBase64(bytes){
  let bin = '';
  for(let i = 0; i < bytes.byteLength; i++) bin += String.fromCharCode(bytes[i]);
  return btoa(bin);
}

// Generate or retrieve a stable random user ID (stored in localStorage)
// WebAuthn requires user.id to be unique per user — never use a hardcoded value
function getOrCreateUserId(){
  try {
    let stored = localStorage.getItem(USER_KEY);
    if(stored) return Uint8Array.from(atob(stored), c => c.charCodeAt(0));
    const id = crypto.getRandomValues(new Uint8Array(16));
    localStorage.setItem(USER_KEY, uint8ToBase64(id));
    return id;
  } catch(e){
    return crypto.getRandomValues(new Uint8Array(16));
  }
}

// On load: wipe any legacy credential that was enrolled before the residentKey fix.
// Old credentials had no USER_KEY (created with hardcoded user.id) — they won't work.
// This runs once, silently, so no console access needed on iPhone.
(function(){
  if(sessionStorage.getItem('bbauth')==='1'){ unlock(); return; }
  try {
    const hasCredId = localStorage.getItem(CRED_KEY);
    const hasUserId = localStorage.getItem(USER_KEY);
    if(hasCredId && !hasUserId){
      // Legacy bad credential — clear it so fresh enrollment happens after password
      localStorage.removeItem(CRED_KEY);
    }
  } catch(e){}
  if(hasWebAuthn() && storedCredId()){
    const btn = document.getElementById('faceid-btn');
    btn.style.display = 'block';
    btn.textContent = '🔐 Use Face ID';
    btn.style.background = 'var(--accent-dim)';
    btn.style.borderColor = 'var(--accent)';
    btn.style.color = 'var(--accent)';
    btn.style.fontWeight = '600';
    document.getElementById('pw-subtitle').textContent = 'Tap Face ID or enter password';
  } else if(hasWebAuthn()){
    document.getElementById('faceid-btn').style.display = 'block';
  }
})();

// Password check — on success enroll Face ID if not yet registered, then unlock
function checkPw(){
  const val = document.getElementById('pw-input').value;
  const hash = val.split('').reduce((a,c)=>(Math.imul(31,a)+c.charCodeAt(0))|0,0);
  if(hash === -874608686){
    if(hasWebAuthn() && !storedCredId()){
      enrollFaceId();
    } else {
      unlock();
    }
  } else {
    document.getElementById('pw-error').style.display='block';
    document.getElementById('pw-input').value='';
    document.getElementById('pw-input').focus();
  }
}

// Enroll a proper passkey (residentKey: required → stores in iCloud Keychain)
// random user.id ensures iOS doesn't deduplicate or reject the credential
async function enrollFaceId(){
  const status = document.getElementById('pw-status');
  try {
    status.textContent = 'Setting up Face ID…';
    const userId = getOrCreateUserId();
    const cred = await navigator.credentials.create({
      publicKey: {
        challenge: CHALLENGE,
        rp: { name: 'Boathouse Blooms', id: RP_ID },
        user: {
          id: userId,
          name: 'boathouse',          // visible in password manager
          displayName: 'Boathouse Blooms'
        },
        pubKeyCredParams: [
          { type: 'public-key', alg: -7 },   // ES256
          { type: 'public-key', alg: -257 }  // RS256
        ],
        authenticatorSelection: {
          authenticatorAttachment: 'platform',
          residentKey: 'required',       // must be 'required' for iCloud Keychain
          requireResidentKey: true,      // legacy flag, set alongside residentKey
          userVerification: 'required'
        },
        timeout: 60000,
        attestation: 'none'
      }
    });
    const credId = uint8ToBase64(new Uint8Array(cred.rawId));
    localStorage.setItem(CRED_KEY, credId);
    status.textContent = '✓ Face ID set up for this device';
    setTimeout(unlock, 600);
  } catch(e){
    status.textContent = '';
    unlock();
  }
}

// Authenticate with stored passkey — only called from button tap (user gesture)
async function tryFaceId(){
  const status = document.getElementById('pw-status');
  const icon   = document.getElementById('pw-icon');
  const rawId  = storedCredId();
  if(!rawId){ return; }
  try {
    status.textContent = 'Waiting for Face ID…';
    icon.textContent = '🔐';
    const credIdBytes = Uint8Array.from(atob(rawId), c => c.charCodeAt(0));
    await navigator.credentials.get({
      publicKey: {
        challenge: CHALLENGE,
        rpId: RP_ID,
        allowCredentials: [{ type: 'public-key', id: credIdBytes }],
        userVerification: 'required',
        timeout: 60000
      }
    });
    icon.textContent = '✅';
    status.textContent = '';
    setTimeout(unlock, 300);
  } catch(e){
    icon.textContent = '🌸';
    status.textContent = e.name === 'NotAllowedError'
      ? 'Face ID cancelled — enter password below'
      : 'Face ID unavailable — enter password below';
  }
}
</script>

const TODAY=new Date();
// TODAY_STR = today's date in local time as "YYYY-MM-DD". String-compare against
// event date strings to avoid the UTC-midnight gotcha (new Date("2026-05-16")
// parses as 8pm ET the previous day, which previously made today's events read
// as past starting at 8pm the night before).
const TODAY_STR=`${TODAY.getFullYear()}-${String(TODAY.getMonth()+1).padStart(2,'0')}-${String(TODAY.getDate()).padStart(2,'0')}`;
function isPast(d){return d&&d<TODAY_STR;}                                  // strictly before today
function isSoon(d){if(!d)return false;const diff=(new Date(d+'T00:00:00')-new Date(TODAY_STR+'T00:00:00'))/86400000;return diff>=0&&diff<=60;}
function fmtDate(d){if(!d)return null;const[y,mo,day]=d.split("-");return`${mo}/${day}/${y.slice(2)}`;}
function getYear(d){return d?parseInt(d.split("-")[0]):null;}
function isFuture(d){return d&&d>=TODAY_STR;}                               // today counts as future

// Build a Google Calendar "create event" URL with client name + date prefilled.
// Used by the No Cal filter's "+ Add to Calendar" button. This opens Google
// Calendar's own event form — it does NOT call any API or proxy. The user must
// pick the "Boathouse Blooms" calendar in the form's dropdown before saving
// (a render?action=TEMPLATE URL cannot force a target calendar). After the
// event is created, its gcal link still needs to be captured into CAL_LINKS
// at the next refresh, same as any Cal Only → Pipeline promotion.
function buildGCalAddUrl(row){
  const params=['action=TEMPLATE'];
  params.push('text='+encodeURIComponent(row.client));
  if(row.date){
    const d=row.date.replace(/-/g,'');           // YYYYMMDD
    params.push('dates='+d+'/'+d);                 // all-day, single day
  }
  // Pull a venue hint out of the notes for the location field, if present.
  const venue=extractVenue(row.notes);
  if(venue) params.push('location='+encodeURIComponent(venue));
  const detail='Boathouse Blooms — created from the No Cal reconciliation filter.'
    +(row.hbStage?' HB stage: '+row.hbStage+'.':'')
    +' Remember to select the Boathouse Blooms calendar before saving.';
  params.push('details='+encodeURIComponent(detail));
  return 'https://calendar.google.com/calendar/render?'+params.join('&');
}
// Best-effort venue extraction: many notes lead with "Venue Name · ..." — grab
// the first segment if it looks like a place rather than a sentence.
function extractVenue(notes){
  if(!notes) return '';
  const first=notes.split('·')[0].trim();
  if(first && first.length<=60 && !/[.!?]$/.test(first) && /\s/.test(first)) return first;
  return '';
}

  {date:"May 16, 2026",label:"Hotfix (post-#57)",changes:[
    "Bug: today's events were being filtered out of the year view. Caroline Barrett's May 16 wedding only appeared when the [Past] year-button was enabled. Root cause: `isPast` used `new Date(\"YYYY-MM-DD\") < TODAY` which parses the date string as UTC midnight (8pm ET the previous day), so any same-day event read as past starting at 8pm the night before. Fix: switched `isPast`/`isFuture` to string-compare against a local-time `TODAY_STR` (\"YYYY-MM-DD\"), and made `isSoon` compute its day-diff using parsed local-time boundaries. Today's events now correctly appear under their year and render as normal (not grayed-out) cards. No data changes; counts unchanged."

function buildAllRows(){
  const rows=[];
  ACCEPTED_NO_HB.forEach(r=>{
    rows.push({type:"accepted",client:r.client,date:r.eventDate||null,hbStage:null,gmailDate:r.gmailDate,gmailEmail:r.email,notes:r.notes,hbCal:false,hbEventId:null,narrative:r.narrative||null});
  });
  GMAIL_ONLY.forEach(g=>{
    rows.push({type:"gmail-only",client:g.client,date:g.eventDate||null,hbStage:null,gmailDate:g.gmailDate,gmailEmail:g.email,notes:g.notes,hbCal:g.hbCal,hbEventId:null,narrative:g.narrative||null,
      noCal:!CAL_LINKS[g.client]});
  });
  CAL_ONLY.forEach(c=>{
    rows.push({type:"cal",client:c.name,date:c.date,hbStage:null,gmailDate:null,gmailEmail:null,
      notes:"HB calendar Inquiry only — no pipeline project. Review in HoneyBook to update stage or remove.",
      hbCal:false,hbEventId:c.hbEventId,narrative:c.narrative||null});
  });
  HB_PIPELINE.forEach(h=>{
    rows.push({type:"hb",client:h.name,date:h.date,hbStage:h.stage,
      gmailDate:null,gmailEmail:null,notes:h.notes||null,hbCal:false,hbEventId:null,narrative:h.narrative||null,
      noCal:!CAL_LINKS[h.name]});
  });
  HB_ARCHIVED.forEach(a=>{
    rows.push({type:"archived",client:a.name,date:a.date,hbStage:null,
      gmailDate:null,gmailEmail:a.email||null,
      notes:(a.notes?a.notes+' · ':'')+`HB archived ${a.archivedAt} (was ${a.source==='CAL_ONLY'?'Cal Only':'Pipeline: '+(a.prevStage||'unknown')})`,
      hbCal:false,hbEventId:a.hbEventId,
      archivedAt:a.archivedAt,archivedSource:a.source,archivedPrevStage:a.prevStage||null,narrative:a.narrative||null});
  });
  return sortByDate(rows);
}

function sortByDate(rows){
  const todayStr = new Date().toLocaleDateString('en-CA'); // YYYY-MM-DD in local time
  function bucket(r){
    if(!r.date) return 1;
    return r.date >= todayStr ? 2 : 0;
  }
  return rows.slice().sort((a,b)=>{
    const ba=bucket(a), bb=bucket(b);
    if(ba!==bb) return ba-bb;
    if(ba===0) return a.date > b.date ? -1 : a.date < b.date ? 1 : 0; // past: most recent first (closest to today at top of past block)
    if(ba===2) return a.date < b.date ? -1 : a.date > b.date ? 1 : 0; // future: soonest first
    return a.client.localeCompare(b.client); // no date: alpha
  });
}

const ALL_ROWS=buildAllRows();
let currentFilter='all',currentYears=new Set([2026]),currentStage='all',currentSearch='',openCard=null;

function onSearch(val){
  currentSearch=val.trim().toLowerCase();
  document.getElementById('search-clear').style.display=val?'block':'none';
  openCard=null;
  render();
}
function clearSearch(){
  document.getElementById('search-input').value='';
  onSearch('');
  document.getElementById('search-input').focus();
}

function filterByYear(rows){
  // No selections → show nothing (forces user to make a choice)
  if(currentYears.size===0) return [];
  return rows.filter(r=>{
    if(!r.date) return true; // undated rows always show
    if(isPast(r.date)) return currentYears.has('past');
    return currentYears.has(getYear(r.date));
  });
}

function getDisplayRows(){
  let rows=filterByYear(ALL_ROWS);

  // Archived and Completed entries are hidden unless the user explicitly
  // filters to them (HB Archived button, or HoneyBook → Completed stage).
  const showingArchivedExplicitly = (currentFilter==='archived');
  const showingCompletedExplicitly = (currentFilter==='hb' && currentStage==='Completed');
  if(!showingArchivedExplicitly) rows=rows.filter(r=>r.type!=='archived');
  if(!showingCompletedExplicitly) rows=rows.filter(r=>r.hbStage!=='Completed');

  if(currentFilter==='gmail') rows=rows.filter(r=>r.type==='accepted'||r.type==='gmail-only');
  else if(currentFilter==='cal') rows=rows.filter(r=>r.type==='cal');
  else if(currentFilter==='nocal') rows=rows.filter(r=>r.noCal);
  else if(currentFilter==='archived') rows=rows.filter(r=>r.type==='archived');
  else if(currentFilter==='hb'){
    rows=rows.filter(r=>r.hbStage);
    if(currentStage!=='all') rows=rows.filter(r=>r.hbStage===currentStage);
  }
  if(currentSearch){
    rows=rows.filter(r=>{
      const name=(r.client||'').toLowerCase();
      const email=(r.gmailEmail||'').toLowerCase();
      const notes=(r.notes||'').toLowerCase();
      return name.includes(currentSearch)||email.includes(currentSearch)||notes.includes(currentSearch);
    });
  }
  return rows;
}

function toggleYear(y,btn){
  if(currentYears.has(y)){
    currentYears.delete(y);
    btn.classList.remove('active');
  } else {
    currentYears.add(y);
    btn.classList.add('active');
  }
  openCard=null;
  render();
}

function setFilter(f,btn){
  currentFilter=f;
  currentStage='all';
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  const sfRow=document.getElementById('stage-filter-row');
  if(f==='hb'){
    sfRow.classList.add('visible');
    document.querySelectorAll('.stage-btn').forEach(b=>b.classList.remove('active'));
    document.getElementById('sf-all').classList.add('active');
    applyStageButtonStyles();
  } else {
    sfRow.classList.remove('visible');
  }
  openCard=null;
  render();
}

function setStage(s,btn){
  currentStage=s;
  document.querySelectorAll('.stage-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  applyStageButtonStyles();
  openCard=null;
  render();
}

function applyStageButtonStyles(){
  document.querySelectorAll('.stage-btn').forEach(btn=>{
    const stage=btn.dataset.stage;
    const style=STAGE_BTN_STYLE[stage];
    if(!style) return;
    if(btn.classList.contains('active')){
      btn.style.background=style.bg;btn.style.color=style.color;btn.style.borderColor=style.border;
    } else {
      btn.style.background='';btn.style.color='';btn.style.borderColor='';
    }
  });
}

function flag(r){
  if(r.type==='accepted') return '🔴';
  if(r.type==='gmail-only') return '📧';
  if(r.type==='cal') return '📅';
  if(r.type==='archived') return '📦';
  if(r.hbStage) return '✅';
  return '🟡';
}
function stageTag(s){const st=STAGE_STYLE[s]||{color:'#8899aa',bg:'#eef4fa'};return`<span class="tag tag-stage" style="color:${st.color};background:${st.bg};border-color:${st.color}44">${s}</span>`;}

function render(){
  const yearRows=filterByYear(ALL_ROWS);
  // Counts reflect what's actually visible by default. Completed and Archived
  // entries don't count toward the default bucket totals — they're hidden
  // unless the user explicitly filters to them (HB Archived button or
  // Completed stage), at which point the filter's own count shows the truth.
  const activeRows = yearRows.filter(r=>r.type!=='archived' && r.hbStage!=='Completed');
  const gmailOnlyCount=activeRows.filter(r=>r.type==='accepted'||r.type==='gmail-only').length;
  const hbCount=activeRows.filter(r=>r.hbStage).length;
  const calCount=activeRows.filter(r=>r.type==='cal').length;
  const noCalCount=activeRows.filter(r=>r.noCal).length;
  const archivedCount=yearRows.filter(r=>r.type==='archived').length;
  const displayed=getDisplayRows();

  document.getElementById('f-gmail').textContent=`📧 Gmail Only (${gmailOnlyCount})`;
  document.getElementById('f-cal').textContent=`📅 Cal Only (${calCount})`;
  document.getElementById('f-nocal').textContent=`🗓️ No Cal (${noCalCount})`;
  document.getElementById('f-hb').textContent=`HoneyBook (${hbCount})`;
  document.getElementById('f-archived').textContent=`📦 HB Archived (${archivedCount})`;
  const allSub=document.getElementById('f-all-sub');
  if(currentFilter==='all'){
    allSub.textContent=`Showing all ${activeRows.length}`;
  } else {
    allSub.textContent=`(showing ${displayed.length} of ${activeRows.length})`;
  }

  if(currentFilter==='hb'){
    const hbYearRows=activeRows.filter(r=>r.hbStage);
    document.getElementById('sf-all').textContent=`All (${hbYearRows.length})`;
    document.querySelectorAll('.stage-btn[data-stage]').forEach(btn=>{
      const s=btn.dataset.stage;
      if(s==='all') return;
      // Completed count comes from full yearRows so the stage button shows
      // the true count — clicking it reveals them.
      const pool = (s==='Completed') ? yearRows.filter(r=>r.hbStage) : hbYearRows;
      const cnt=pool.filter(r=>r.hbStage===s).length;
      btn.textContent=`${s} (${cnt})`;
    });
    applyStageButtonStyles();
  }

  const list=document.getElementById('listArea');
  if(!displayed.length){
    list.innerHTML=`<div class="empty"><div style="font-size:32px;margin-bottom:10px">${currentSearch?'🔍':'✅'}</div><div>${currentSearch?'No results for "'+currentSearch+'"':'No items for this selection'}</div></div>`;
    return;
  }

  list.innerHTML=displayed.map((r,i)=>{
    const ds=r.date?fmtDate(r.date):null;
    const p=isPast(r.date),s=isSoon(r.date);
    const dc=p?'tag-past':s?'tag-soon':'tag-date';
    const dsuf=p?' PAST':s?' SOON':'';
    let noteClass='ok';
    if(r.type==='accepted') noteClass='red';
    else if(r.type==='gmail-only') noteClass='orange';
    else if(r.type==='cal') noteClass='purple';
    else if(r.type==='archived') noteClass='archived';

    let primaryTag='';
    if(r.type==='accepted') primaryTag='<span class="tag tag-accepted">⚠ ACCEPTED — NEEDS HB PROJECT</span>';
    else if(r.type==='gmail-only') primaryTag='<span class="tag tag-gmail-only">📧 GMAIL ONLY</span>';
    else if(r.type==='cal') primaryTag='<span class="tag tag-cal-only">📅 CAL ONLY</span>';
    else if(r.type==='archived') primaryTag='<span class="tag tag-archived">📦 HB ARCHIVED</span>';
    else if(r.hbStage) primaryTag=stageTag(r.hbStage);
    else primaryTag='<span class="tag tag-noHB">NOT IN HONEYBOOK</span>';

    const hbLink=HB_LINKS[r.client]||(r.hbEventId?`https://www.honeybook.com/app/event/${r.hbEventId}`:null);
    const gmailLink=GMAIL_THREADS[r.client];
    const calLink=CAL_LINKS[r.client]||(r.type==='cal'?CAL_ONLY_GCAL_LINKS[r.client]:null);

    return`<div class="card type-${r.type}${p?' is-past':''}" onclick="toggleCard(${i})">
      <div class="card-top"><div class="card-name">${r.client}</div><div class="card-flag">${flag(r)}</div></div>
      <div class="card-tags">
        ${primaryTag}
        ${ds?`<span class="tag ${dc}">${ds}${dsuf}</span>`:''}
        ${r.gmailDate?`<span class="tag tag-gmail">📧 ${fmtDate(r.gmailDate)}</span>`:''}
        ${r.hbCal?`<span class="tag tag-hb-cal">📆 HB calendar</span>`:''}
        ${r.gmailEmail?`<span class="tag tag-email">${r.gmailEmail}</span>`:''}
      </div>
      <div class="card-detail" id="d${i}">
        ${r.notes?`<span class="note ${noteClass}">${r.notes}</span>`:''}
        ${r.gmailDate?`<div>Last Gmail: <span>${fmtDate(r.gmailDate)}</span></div>`:''}
        ${r.gmailEmail?`<div>Email: <a href="https://mail.google.com/mail/u/0/?authuser=boathouseblooms%40gmail.com#search/from%3A${encodeURIComponent(r.gmailEmail)}+OR+to%3A${encodeURIComponent(r.gmailEmail)}" target="_blank" style="font-family:'DM Mono',monospace;font-size:calc(12px * var(--detail-scale));color:var(--gold);text-decoration:none;">${r.gmailEmail} ↗</a></div>`:''}
        ${r.date?`<div>Event date: <span>${fmtDate(r.date)}${p?' (past)':s?' (soon!)':''}</span></div>`:''}
        ${r.hbCal?`<div>HB calendar: <span>Inquiry on calendar — no pipeline project</span></div>`:''}
        ${(hbLink||gmailLink||calLink)?`<div style="display:flex;gap:12px;flex-wrap:wrap;margin-top:4px">${hbLink?'<a href="'+hbLink+'" target="_blank" style="color:var(--blue);font-family:DM Mono,monospace;font-size:calc(11px * var(--detail-scale));text-decoration:none;">↗ HoneyBook</a>':''}${gmailLink?' <a href="'+gmailLink+'" target="_blank" style="color:var(--gold);font-family:DM Mono,monospace;font-size:calc(11px * var(--detail-scale));text-decoration:none;">↗ Gmail</a>':''}${calLink?' <a href="'+calLink+'" target="_blank" style="color:var(--green);font-family:DM Mono,monospace;font-size:calc(11px * var(--detail-scale));text-decoration:none;">↗ Calendar</a>':''}</div>`:''}
        ${r.noCal?`<a class="addcal-btn" href="${buildGCalAddUrl(r)}" target="_blank" rel="noopener" onclick="event.stopPropagation();">🗓️ + Add to Calendar</a><span class="addcal-note">Opens Google Calendar prefilled${r.date?'':' — no event date on file, set one in the form'}. Pick the <b>Boathouse Blooms</b> calendar before saving.</span>`:''}
        <div>Source: <span>${r.type==='accepted'?'Gmail — accepted, not in HB':r.type==='gmail-only'?'Gmail only — not in HB pipeline':r.type==='cal'?'HB calendar only — no pipeline project':'HoneyBook pipeline'}</span></div>
        ${r.narrative?`<button class="history-btn" id="hb${i}" onclick="event.stopPropagation();toggleNarrative(${i})">📖 Full History</button><div class="narrative" id="n${i}"><div class="narrative-summary">${escapeHtml(r.narrative.summary)}</div><ul class="narrative-timeline">${(r.narrative.timeline||[]).map(t=>`<li class="narrative-entry"><span class="narrative-date">${fmtDate(t.date)}</span><span class="narrative-source ${t.source}">${sourceLabel(t.source)}</span><span class="narrative-text">${escapeHtml(t.text)}</span></li>`).join('')}</ul></div>`:''}
      </div>
    </div>`;
  }).join('');
}

function escapeHtml(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function sourceLabel(s){
  const m={'gmail-out':'OUT','gmail-in':'IN','zapier':'HB','calendar':'CAL','note':'NOTE'};
  return m[s]||s.toUpperCase();
}

function toggleCard(i){
  if(openCard!==null&&openCard!==i){const prev=document.getElementById('d'+openCard);if(prev)prev.classList.remove('open');}
  const d=document.getElementById(`d${i}`);
  if(d){d.classList.toggle('open');openCard=d.classList.contains('open')?i:null;}
}

function toggleNarrative(i){
  const n=document.getElementById('n'+i);
  const b=document.getElementById('hb'+i);
  if(n){n.classList.toggle('open');}
  if(b){b.classList.toggle('open');}
}

render();
setFilter('all', document.getElementById('f-all'));
</script>

<script>
const GITHUB_REPO='BHB-David/boathouse-blooms';
const GITHUB_FILE='index.html';
let refreshCancelled=false;
function setRefreshUI(icon,title,msg,pct){document.getElementById('refresh-icon').textContent=icon;document.getElementById('refresh-title').textContent=title;document.getElementById('refresh-msg').textContent=msg;document.getElementById('refresh-bar').style.width=pct+'%';}
function copyAndOpenClaude(){navigator.clipboard.writeText('refresh the reconciliation table').catch(()=>{});window.open('https://claude.ai/chat/8ebf0c74-9554-48a5-8e0f-0951dc52ce10','_blank');}
function cancelRefresh(){refreshCancelled=true;document.getElementById('refresh-overlay').style.display='none';}
async function startRefresh(){
  refreshCancelled=false;
  document.getElementById('refresh-overlay').style.display='flex';
  setRefreshUI('🔄','Refreshing Data','Fetching latest Gmail & Calendar data...',10);
  try {
    setRefreshUI('📧','Checking Gmail','Scanning sent proposals...',20);
    const freshData=await fetchFreshData();
    if(refreshCancelled)return;
    setRefreshUI('📅','Checking Calendar','Scanning HoneyBook calendar...',50);
    await new Promise(r=>setTimeout(r,500));
    if(refreshCancelled)return;
    setRefreshUI('✏️','Updating Page','Writing fresh data to page...',65);
    const cleanHtml=await fetchCleanHtml();
    const updatedHtml=patchHtml(cleanHtml,freshData);
    if(refreshCancelled)return;
    setRefreshUI('📤','Deploying','Pushing to GitHub Pages...',80);
    await commitToGithub(updatedHtml);
    if(refreshCancelled)return;
    setRefreshUI('⏳','Almost Done','Waiting for GitHub Pages to rebuild...',90);
    document.getElementById('refresh-cancel').style.display='none';
    let secs=65;
    const countEl=document.getElementById('refresh-countdown');
    countEl.style.display='block';
    const ticker=setInterval(()=>{
      if(refreshCancelled){clearInterval(ticker);return;}
      secs--;countEl.textContent='Reloading in '+secs+'s...';
      document.getElementById('refresh-bar').style.width=(90+(65-secs)/65*10)+'%';
      if(secs<=0){clearInterval(ticker);setRefreshUI('✅','Done!','Reloading now...',100);setTimeout(()=>location.reload(),1000);}
    },1000);
  } catch(err){
    setRefreshUI('❌','Error',err.message||'Something went wrong. Try again.',0);
    document.getElementById('refresh-cancel').textContent='Close';
  }
}
// HB stage updates from Zapier are handled by Claude at refresh time.
// Claude scans for [HB Update] emails (subject: "[HB Update] Name → _STAGE_")
// via Gmail MCP and directly patches HB_PIPELINE stage values before deploying.
async function fetchFreshData(){
  const resp=await fetch('https://boathouse-proxy.david-9bd.workers.dev',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:200,messages:[{role:'user',content:`Return ONLY valid JSON: {"timestamp":"${new Date().toLocaleString('en-US',{timeZone:'America/New_York'})}","gmailCount":${GMAIL_ONLY.length},"note":"No changes"}`}]})});
  if(!resp.ok)throw new Error('Claude API error: '+resp.status);
  const data=await resp.json();
  return JSON.parse(data.content[0].text.replace(/```json|```/g,'').trim());
}
function patchHtml(html,freshData){
  let p=html.replace(/new Date\('[^']+'\)/,"new Date('"+new Date().toISOString()+"')");
  p=p.replace(/Gmail proposals: <span[^>]+>\d+ flagged<\/span>/,'Gmail proposals: <span style="color:var(--text)">'+freshData.gmailCount+' flagged</span>');
  return p;
}
async function fetchCleanHtml(){
  const WORKER='https://boathouse-proxy.david-9bd.workers.dev';
  const r=await fetch(WORKER,{method:'POST',headers:{'Content-Type':'application/json','X-Action':'github-sha'},body:JSON.stringify({repo:GITHUB_REPO,file:GITHUB_FILE})});
  if(!r.ok)throw new Error('Could not fetch file from GitHub ('+r.status+')');
  const d=await r.json();
  if(!d.content)throw new Error('GitHub returned no content');
  const b64=d.content.replace(/[\r\n\s]/g,'');
  const bytes=Uint8Array.from(atob(b64),c=>c.charCodeAt(0));
  const decoded=new TextDecoder('utf-8').decode(bytes);
  if(!decoded||decoded.length<1000)throw new Error('Decoded HTML too short: '+decoded.length);
  return decoded;
}
async function commitToGithub(htmlContent){
  const WORKER='https://boathouse-proxy.david-9bd.workers.dev';
  const r=await fetch(WORKER,{method:'POST',headers:{'Content-Type':'application/json','X-Action':'github-sha'},body:JSON.stringify({repo:GITHUB_REPO,file:GITHUB_FILE})});
  if(!r.ok)throw new Error('GitHub: could not get file SHA ('+r.status+')');
  const sha=(await r.json()).sha;
  const encoded=btoa(unescape(encodeURIComponent(htmlContent)));
  const now=new Date().toLocaleString('en-US',{timeZone:'America/New_York',month:'short',day:'numeric',year:'numeric',hour:'numeric',minute:'2-digit'});
  const cr=await fetch(WORKER,{method:'POST',headers:{'Content-Type':'application/json','X-Action':'github-commit'},body:JSON.stringify({repo:GITHUB_REPO,file:GITHUB_FILE,message:'Auto-refresh '+now,content:encoded,sha})});
  if(!cr.ok){const e=await cr.json();throw new Error('GitHub commit failed: '+(e.message||cr.status));}
}
</script>

<script>
(function(){
  var FS_KEY='bbFontScale';
  // Discrete steps: 1.0 (default), 1.15, 1.3, 1.5, 1.7
  var STEPS=[1,1.15,1.3,1.5,1.7];
  function getIdx(){
    try{
      var v=parseFloat(localStorage.getItem(FS_KEY));
      var i=STEPS.indexOf(v);
      return i>=0?i:0;
    }catch(e){return 0;}
  }
  function apply(idx){
    var s=STEPS[idx];
    document.documentElement.style.setProperty('--detail-scale',s);
    try{localStorage.setItem(FS_KEY,String(s));}catch(e){}
  }
  window.adjustFontSize=function(dir){
    var idx=getIdx();
    if(dir===0){idx=0;}
    else{idx=Math.max(0,Math.min(STEPS.length-1,idx+dir));}
    apply(idx);
  };
  // Initialize on load
  apply(getIdx());
})();
</script>
