  .nav-title p{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;margin-top:2px;font-family:'DM Mono',monospace;}

  .year-bar{width:100%;max-width:700px;padding:12px 20px 0;display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
  .year-label{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;flex-shrink:0;}
  .year-btn{flex-shrink:0;padding:5px 14px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--muted);font-family:'DM Mono',monospace;font-size:11px;cursor:pointer;transition:all .15s;}
  .year-btn:hover{border-color:var(--accent);color:var(--accent);}
  .year-btn.active{background:rgba(96,165,250,0.15);color:var(--blue);border-color:var(--blue);}
  .year-btn.all-future.active{background:rgba(62,207,142,0.15);color:var(--green);border-color:var(--green);}

  .refresh-box{width:100%;max-width:700px;padding:10px 20px 0;}
  .refresh-inner{background:#0a1020;border:1px solid #1e3050;border-radius:12px;padding:10px 14px;display:flex;align-items:center;gap:10px;}

  .refresh-text p{font-size:10px;color:var(--muted);line-height:1.5;font-family:'DM Mono',monospace;}
  .refresh-text code{color:var(--blue);background:#080d14;padding:1px 5px;border-radius:4px;}
  .data-date{font-family:'DM Mono',monospace;font-size:9px;color:var(--muted);white-space:nowrap;flex-shrink:0;}

  .stats{width:100%;max-width:700px;padding:10px 20px 10px;display:flex;gap:8px;}
  .stat-card{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:8px 10px;}
  .stat-card .num{font-size:20px;font-weight:600;}
  .stat-card .lbl{font-family:'DM Mono',monospace;font-size:8px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-top:2px;}

  .filters{width:100%;max-width:700px;padding:0 20px 12px;display:flex;gap:7px;overflow-x:auto;}
  .filter-btn{flex-shrink:0;padding:6px 14px;border-radius:24px;border:1px solid var(--border);background:transparent;color:var(--muted);font-family:'Cormorant Garamond',serif;font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;}
  .filter-btn.active{background:var(--accent);color:var(--bg);border-color:var(--accent);}

  .list{width:100%;max-width:700px;padding:0 12px 80px;flex:1;}

  .card{border-radius:12px;padding:11px 13px;margin-bottom:7px;cursor:pointer;transition:opacity .1s;border-left-width:3px;border-left-style:solid;border-top:1px solid;border-right:1px solid;border-bottom:1px solid;}
  .card:hover{opacity:.88;}
  .card.type-accepted{background:#120808;border-color:#3a1010;border-left-color:var(--red);}
  .card.type-gmail-only{background:#120a04;border-color:#2a1a08;border-left-color:var(--orange);}
  .card.type-urgent{background:#100606;border-color:#2a1010;border-left-color:var(--red);}
  .card.type-cal{background:var(--purple-dim);border-color:#1a1230;border-left-color:var(--purple);}

  .card-name{font-size:15px;font-weight:600;line-height:1.2;}
  .card-flag{font-size:15px;flex-shrink:0;}
  .card-tags{display:flex;gap:5px;flex-wrap:wrap;align-items:center;}
  .tag{font-family:'DM Mono',monospace;font-size:9px;font-weight:500;padding:2px 8px;border-radius:20px;border:1px solid;white-space:nowrap;}
  .tag-noHB{background:#1a0606;color:var(--red);border-color:#3a1515;}

  .tag-email{background:var(--surface);color:#3a5070;border-color:var(--border);font-size:8px;}

  .tag-hb-cal{background:#0a1828;color:#4a9adf;border-color:#1a3050;font-size:8px;}

<div id="pw-gate">
  <div class="pw-box">
    <div style="font-size:32px;margin-bottom:12px">🌸</div>
    <h2>Boathouse Blooms</h2>
    <p>Enter password to continue</p>
    <input class="pw-input" type="password" id="pw-input" placeholder="Password" onkeydown="if(event.key==='Enter')checkPw()"/>
    <button class="pw-btn" onclick="checkPw()">Enter</button>
    <div class="pw-error" id="pw-error">Incorrect password</div>
  </div>
</div>

<script>
(function(){
  // Check if already authenticated this session
  if(sessionStorage.getItem('bbauth')==='1'){
    document.getElementById('pw-gate').classList.add('hidden');
  }
})();
function checkPw(){
  const val = document.getElementById('pw-input').value;
  // Simple hash check — password is stored as a hash, not plaintext
  // Password: blooms2026
  const hash = val.split('').reduce((a,c)=>(Math.imul(31,a)+c.charCodeAt(0))|0,0);
  if(hash === -874608686){
    sessionStorage.setItem('bbauth','1');
    document.getElementById('pw-gate').classList.add('hidden');
  } else {
    document.getElementById('pw-error').style.display='block';
    document.getElementById('pw-input').value='';
    document.getElementById('pw-input').focus();
  }
}
</script>

function buildAllRows(){
  const rows=[];

  // 1. Accepted, no HB project — highest priority
  ACCEPTED_NO_HB.forEach(r=>{
    rows.push({
      priority:1,type:"accepted",client:r.client,
      date:r.eventDate||null,hbStage:null,
      gmailDate:r.gmailDate,gmailEmail:r.email,
      notes:r.notes,hbCal:false,
    });
  });

  // 2. Gmail-only proposals
  GMAIL_ONLY.forEach((g,i)=>{
    rows.push({
      priority:2+i*0.01,type:"gmail-only",client:g.client,
      date:g.eventDate||null,hbStage:null,
      gmailDate:g.gmailDate,gmailEmail:g.email,
      notes:g.notes,hbCal:g.hbCal,
    });
  });

  // 3. Cal-only booked events
  CAL_ONLY.forEach(c=>{
    rows.push({
      priority:5,type:"cal",client:c.name,date:c.date,
      hbStage:null,gmailDate:null,gmailEmail:c.email,
      notes:`On HB calendar — ${c.location}. No pipeline project.`,hbCal:false,
    });
  });

  // 4. HB pipeline
  HB_PIPELINE.forEach(h=>{
    rows.push({
      priority:10+STAGE_ORDER.indexOf(h.stage),type:"hb",
      client:h.name,date:h.date,hbStage:h.stage,
      gmailDate:null,gmailEmail:null,notes:null,hbCal:false,
    });
  });

  return rows.sort((a,b)=>a.priority-b.priority);
}

const ALL_ROWS=buildAllRows();
let currentFilter='urgent',currentYear=2026,openCard=null;

function filterByYear(rows){
  if(currentYear==='all') return rows.filter(r=>!r.date||isFuture(r.date));
  return rows.filter(r=>!r.date||getYear(r.date)===currentYear);
}

function getDisplayRows(){
  let rows=filterByYear(ALL_ROWS);
  if(currentFilter==='urgent') rows=rows.filter(r=>r.type==='accepted'||r.type==='urgent');
  else if(currentFilter==='gmail') rows=rows.filter(r=>r.type==='accepted'||r.type==='gmail-only');
  else if(currentFilter==='cal') rows=rows.filter(r=>r.type==='cal');
  else if(currentFilter==='hb') rows=rows.filter(r=>r.hbStage);
  return rows;
}

function setYear(y,btn){
  currentYear=y;
  document.querySelectorAll('.year-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  openCard=null;
  render();
}

function setFilter(f,btn){
  currentFilter=f;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  openCard=null;
  render();
}

function flag(r){
  if(r.type==='accepted') return '🔴';
  if(r.type==='gmail-only') return '📧';
  if(r.type==='cal') return '📅';
  if(r.priority<=4) return '🟡';
  return '✅';
}
function stageTag(s){const st=STAGE_STYLE[s]||{color:'#8899aa',bg:'#1a2030'};return`<span class="tag tag-stage" style="color:${st.color};background:${st.bg};border-color:${st.color}44">${s}</span>`;}

function render(){
  const yearRows=filterByYear(ALL_ROWS);
  const urgentCount=yearRows.filter(r=>r.type==='accepted'||r.type==='urgent'||r.type==='cal').length;
  const gmailOnlyCount=yearRows.filter(r=>r.type==='accepted'||r.type==='gmail-only').length;
  const hbCount=yearRows.filter(r=>r.hbStage).length;
  const displayed=getDisplayRows();

  document.getElementById('statHB').textContent=hbCount;
  document.getElementById('statUrgent').textContent=urgentCount;
  document.getElementById('statUrgent').style.color=urgentCount>0?'var(--red)':'var(--green)';
  document.getElementById('statGmail').textContent=gmailOnlyCount;
  document.getElementById('statShowing').textContent=displayed.length;

  document.getElementById('f-urgent').textContent=`🚨 Urgent (${urgentCount})`;
  document.getElementById('f-gmail').textContent=`📧 Gmail Only (${gmailOnlyCount})`;
  document.getElementById('f-hb').textContent=`HoneyBook (${hbCount})`;
  document.getElementById('f-all').textContent=`All (${yearRows.length})`;

  const list=document.getElementById('listArea');
  if(!displayed.length){
    list.innerHTML=`<div class="empty"><div style="font-size:32px;margin-bottom:10px">✅</div><div>No items for this selection</div></div>`;
    return;
  }

  list.innerHTML=displayed.map((r,i)=>{
    const ds=r.date?fmtDate(r.date):null;
    const p=isPast(r.date),s=isSoon(r.date);
    const dc=p?'tag-past':s?'tag-soon':'tag-date';
    const dsuf=p?' PAST':s?' SOON':'';
    let noteClass='ok';
    if(r.type==='accepted') noteClass='red';
    else if(r.type==='gmail-only') noteClass='orange';

    let primaryTag='';
    if(r.type==='accepted') primaryTag='<span class="tag tag-accepted">⚠ ACCEPTED — NEEDS HB PROJECT</span>';
    else if(r.type==='gmail-only') primaryTag='<span class="tag tag-gmail-only">📧 GMAIL ONLY</span>';
    else if(r.hbStage) primaryTag=stageTag(r.hbStage);
    else primaryTag='<span class="tag tag-noHB">NOT IN HONEYBOOK</span>';

    return`<div class="card type-${r.type}" onclick="toggleCard(${i})">
      <div class="card-top"><div class="card-name">${r.client}</div><div class="card-flag">${flag(r)}</div></div>
      <div class="card-tags">
        ${primaryTag}
        ${ds?`<span class="tag ${dc}">${ds}${dsuf}</span>`:''}
        ${r.gmailDate?`<span class="tag tag-gmail">📧 ${fmtDate(r.gmailDate)}</span>`:''}
        ${r.hbCal?`<span class="tag tag-hb-cal">📆 HB calendar</span>`:''}
        ${r.gmailEmail?`<span class="tag tag-email">${r.gmailEmail}</span>`:''}
      </div>
      <div class="card-detail" id="d${i}">
        ${r.notes?`<span class="note ${noteClass}">${r.notes}</span>`:''}
        ${r.gmailDate?`<div>Last Gmail: <span>${fmtDate(r.gmailDate)}</span></div>`:''}
        ${r.gmailEmail?`<div>Email: <a href="https://mail.google.com/mail/u/0/?authuser=boathouseblooms%40gmail.com#search/from%3A${encodeURIComponent(r.gmailEmail)}+OR+to%3A${encodeURIComponent(r.gmailEmail)}" target="_blank" style="font-family:'DM Mono',monospace;font-size:11px;color:var(--gold);text-decoration:none;">${r.gmailEmail} ↗</a></div>`:''}
        ${r.date?`<div>Event date: <span>${fmtDate(r.date)}${p?' (past)':s?' (soon!)':''}</span></div>`:''}
        ${r.hbCal?`<div>HB calendar: <span>Inquiry on calendar — no pipeline project</span></div>`:''}
        ${(HB_LINKS[r.client]||GMAIL_THREADS[r.client]||CAL_LINKS[r.client])?`<div style="display:flex;gap:12px;flex-wrap:wrap;margin-top:4px">${HB_LINKS[r.client]?'<a href="'+HB_LINKS[r.client]+'" target="_blank" style="color:var(--blue);font-family:DM Mono,monospace;font-size:10px;text-decoration:none;">↗ HoneyBook</a>':''}${GMAIL_THREADS[r.client]?' <a href="'+GMAIL_THREADS[r.client]+'" target="_blank" style="color:var(--gold);font-family:DM Mono,monospace;font-size:10px;text-decoration:none;">↗ Gmail</a>':''}${CAL_LINKS[r.client]?' <a href="'+CAL_LINKS[r.client]+'" target="_blank" style="color:var(--green);font-family:DM Mono,monospace;font-size:10px;text-decoration:none;">↗ Calendar</a>':''}</div>`:''}
        <div>Source: <span>${r.type==='accepted'?'Gmail — accepted, not in HB':r.type==='gmail-only'?'Gmail only — not in HB pipeline':r.type==='cal'?'Calendar only':'HoneyBook pipeline'}</span></div>
      </div>
    </div>`;
  }).join('');
}

function toggleCard(i){
  if(openCard!==null&&openCard!==i){const prev=document.getElementById('d'+openCard);if(prev)prev.classList.remove('open');}
  const d=document.getElementById(`d${i}`);
  if(d){d.classList.toggle('open');openCard=d.classList.contains('open')?i:null;}
}

render();
</script>

<script>
(function(){
  // Set the data timestamp in Boston (Eastern) time
  const built = new Date('2026-03-26T01:03:00Z');
  const opts = {month:'short',day:'numeric',year:'numeric',hour:'numeric',minute:'2-digit',hour12:true,timeZone:'America/New_York'};
  const formatted = built.toLocaleString('en-US', opts).replace(',','').replace(' at ','');
  // Format: "Mar 25, 2026 · 8:03 PM"
  const parts = built.toLocaleString('en-US', opts);
  document.getElementById('data-timestamp').textContent = parts;
})();
</script>
